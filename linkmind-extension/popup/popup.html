<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkMind Saver</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Not logged in state ── -->
  <div id="state-login" class="state hidden">
    <div class="logo">
      <div class="logo__icon">
        <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="3" fill="white"/>
          <circle cx="14" cy="6" r="2" fill="white" opacity="0.7"/>
          <circle cx="14" cy="22" r="2" fill="white" opacity="0.7"/>
          <circle cx="6" cy="14" r="2" fill="white" opacity="0.7"/>
          <circle cx="22" cy="14" r="2" fill="white" opacity="0.7"/>
          <circle cx="8" cy="8" r="1.5" fill="white" opacity="0.4"/>
          <circle cx="20" cy="8" r="1.5" fill="white" opacity="0.4"/>
          <circle cx="8" cy="20" r="1.5" fill="white" opacity="0.4"/>
          <circle cx="20" cy="20" r="1.5" fill="white" opacity="0.4"/>
        </svg>
      </div>
      <span class="logo__name">LinkMind</span>
    </div>

    <p class="login-msg">Sign in to save pages to your knowledge base</p>

    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="login-email" placeholder="name@example.com" />
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>

    <div id="login-error" class="error hidden"></div>

    <button id="btn-login" class="btn btn--primary">Sign In</button>
    <button id="btn-open-app" class="btn btn--ghost">Open LinkMind ↗</button>
  </div>

  <!-- ── Save state ── -->
  <div id="state-save" class="state hidden">
    <div class="header">
      <div class="logo">
        <div class="logo__icon">
          <svg width="16" height="16" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="3" fill="white"/>
            <circle cx="14" cy="6" r="2" fill="white" opacity="0.7"/>
            <circle cx="14" cy="22" r="2" fill="white" opacity="0.7"/>
            <circle cx="6" cy="14" r="2" fill="white" opacity="0.7"/>
            <circle cx="22" cy="14" r="2" fill="white" opacity="0.7"/>
          </svg>
        </div>
        <span class="logo__name">LinkMind</span>
      </div>
      <button id="btn-logout" class="btn-icon" title="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Page info -->
    <div class="page-info">
      <img id="page-favicon" class="page-info__favicon" src="" alt="" />
      <div class="page-info__meta">
        <p id="page-title" class="page-info__title"></p>
        <p id="page-url" class="page-info__url"></p>
      </div>
    </div>

    <!-- Note field -->
    <div class="field">
      <label>NOTE (optional)</label>
      <textarea id="save-note" placeholder="Add a quick note..." rows="2"></textarea>
    </div>

    <!-- Collection picker -->
    <div class="field">
      <label>COLLECTION (optional)</label>
      <select id="collection-select">
        <option value="">No collection</option>
      </select>
    </div>

    <div id="save-error" class="error hidden"></div>

    <button id="btn-save" class="btn btn--primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      Save to LinkMind
    </button>
  </div>

  <!-- ── Success state ── -->
  <div id="state-success" class="state hidden">
    <div class="success">
      <div class="success__icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h3 class="success__title">Saved!</h3>
      <p class="success__msg">AI is processing your link...</p>
      <button id="btn-view" class="btn btn--ghost">View in Library ↗</button>
      <button id="btn-save-another" class="btn btn--ghost">Save Another</button>
    </div>
  </div>

  <!-- ── Already saved state ── -->
  <div id="state-duplicate" class="state hidden">
    <div class="success">
      <div class="success__icon success__icon--yellow">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h3 class="success__title">Already Saved</h3>
      <p class="success__msg">This page is already in your library.</p>
      <button id="btn-view-duplicate" class="btn btn--ghost">View in Library ↗</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
